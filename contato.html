  <main class="container" style="margin-top:30px; min-height:70vh;">
    
<!-- Componente: Formulário de Contato Cyber-Chumbo (CSS Puro) -->
<div id="contato-cyber" class="form-container">
    
  <!-- O Form aponta para o serviço gratuito de envio -->
  <form action="https://formspree.io" method="POST" class="form-corpo">
      
      <!-- CAMPO: NOME -->
      <div class="form-grupo">
          <input type="text" name="nome" id="campo-nome" class="form-input" placeholder=" " required autocomplete="off">
          <label for="campo-nome" class="form-label">Nome_Do_Remetente</label>
          <span class="linha-laser"></span>
      </div>

      <!-- CAMPO: E-MAIL -->
      <div class="form-grupo">
          <input type="email" name="email" id="campo-email" class="form-input" placeholder=" " required autocomplete="off">
          <label for="campo-email" class="form-label">Email_De_Contato</label>
          <span class="linha-laser"></span>
      </div>

      <!-- CAMPO: MENSAGEM -->
      <div class="form-grupo">
          <textarea name="mensagem" id="campo-mensagem" class="form-input" placeholder=" " rows="5" required></textarea>
          <label for="campo-mensagem" class="form-label">Diretriz_Da_Mensagem</label>
          <span class="linha-laser"></span>
      </div>

      <!-- BOTÃO ENVIAR TRIDIMENSIONAL -->
      <button type="submit" class="form-btn-enviar">
          Transmitir_Dados_ ⚡
      </button>

  </form>
</div>
