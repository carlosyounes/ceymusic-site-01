<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDIO.CORE - Gabarito</title>
    
    <!-- Preload de fontes -->
    <link rel="preload" href="fonts/orbitron-variable.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="fonts/exo2-variable.woff2" as="font" type="font/woff2" crossorigin>
  
    <!-- Estilos Base -->
    <link rel="stylesheet" href="css/var.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/typo.css">
    
    <!-- Componentes Estruturais -->
    <link rel="stylesheet" href="css/comp/nav.css">
    <link rel="stylesheet" href="css/comp/footer.css">
  
    <!-- Componentes de Conteúdo -->
    <link rel="stylesheet" href="css/comp/card.css">
    <link rel="stylesheet" href="css/comp/carousel.css">
    <link rel="stylesheet" href="css/comp/audio.css">
    <link rel="stylesheet" href="css/comp/playlist.css">  
    <link rel="stylesheet" href="css/comp/playerjs.css">
    <link rel="stylesheet" href="css/comp/playlistjs.css">
    <link rel="stylesheet" href="css/comp/carouseljs.css">
  </head>
  
<body>
  <!-- Controle de Menu CSS Puro -->
  <input type="radio" name="global-nav" id="nav-home" class="nav-menu-inputs">
  <input type="radio" name="global-nav" id="nav-music" class="nav-menu-inputs" checked>
  <input type="radio" name="global-nav" id="nav-tech" class="nav-menu-inputs">
  <input type="radio" name="global-nav" id="nav-edu" class="nav-menu-inputs">
  <input type="radio" name="global-nav" id="nav-services" class="nav-menu-inputs">
  <input type="radio" name="global-nav" id="nav-products" class="nav-menu-inputs">
  <input type="radio" name="global-nav" id="nav-articles" class="nav-menu-inputs">
  <input type="radio" name="global-nav" id="nav-contact" class="nav-menu-inputs">

  <header class="main-header">
    <div class="logo-container">
      <svg class="svg-waveform" viewBox="0 0 60 30"><path d="M5,15 Q12,2 20,15 T35,15 T50,15 T55,15" /></svg>
      <div class="logo-text-block">
        <div class="logo-line-1"><span>CEY</span><em>Music</em></div>
        <div class="logo-line-2">Tecnologia & Arte</div>
      </div>
    </div>
    <nav>
      <ul class="nav-menu">
        <li><label class="nav-label" for="nav-home"><a href="index.html">Home</a></label></li>
        <li><label class="nav-label" for="nav-music"><a href="musica.html">Música</a></label></li>
        <li><label class="nav-label" for="nav-tech"><a href="tecnologia.html">Tecnologia</a></label></li>
        <li><label class="nav-label" for="nav-edu"><a href="arte-edu.html">Arte-Edu</a></label></li>
        <li><label class="nav-label" for="nav-services"><a href="servicos.html">Serviços</a></label></li>
        <li><label class="nav-label" for="nav-products"><a href="produtos.html">Produtos</a></label></li>
        <li><label class="nav-label" for="nav-articles"><a href="artigos/">Artigos</a></label></li>
        <li><label class="nav-label" for="nav-contact"><a href="contato.html">Contato</a></label></li>
      </ul>
    </nav>
  </header>

  <main class="container" style="margin-top:30px; min-height:70vh;">
    <section class="neo-card" style="--card-color: #b026ff; margin-bottom: 40px;">
    


      <!-- COMPONENTE: PLAYER INDIVIDUAL CUSTOMIZADO -->
      <article class="audio-player-card" style="margin-bottom: 45px;">
        <div id="player-chumbo" class="player-slim" style="margin-bottom: 25px;">
          <audio id="meu-audio" src="media/audio/cey-sunshine-way.mp3" preload="auto"></audio>
          <button id="btn-play-pause" class="btn-controle status-pausado">
            <svg class="icone-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg class="icone-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <div class="conteudo-player">
              <div class="info-musica">
                  <span class="titulo-faixa">Sunshine Way</span>
                  <span class="separador">•</span>
                  <span class="detalhes-faixa">Carlos Emilio Younes <span class="ano-faixa">(2000)</span></span>
              </div>
              <div class="progresso-container">
                  <span id="tempo-atual" class="tempo">0:00</span>
                  <input type="range" id="barra-progresso" value="0" max="100">
                  <span id="tempo-total" class="tempo">0:00</span>
              </div>
          </div>
        </div>

      
      </article>



      <!-- COMPONENTE: PLAYLIST MODULAR ADVANCED -->
      <div id="playlist-chumbo" class="playlist-container">
        <div class="player-slim">
            <audio id="play-audio-elemento" preload="auto"></audio>
            <button id="play-btn-controle" class="btn-controle status-pausado">
                <svg class="icone-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg class="icone-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <div class="conteudo-player">
                <div class="info-musica">
                    <span id="play-titulo" class="titulo-faixa">Selecione uma faixa</span>
                    <span class="separador">•</span>
                    <span id="play-autor" class="detalhes-faixa">---</span>
                </div>
                <div class="progresso-container">
                    <span id="play-tempo-atual" class="tempo">0:00</span>
                    <input type="range" id="play-barra-progresso" value="0" max="100">
                    <span id="play-tempo-total" class="tempo">0:00</span>
                </div>
            </div>
        </div>

        <ul class="lista-faixas">
            <li class="item-faixa" data-src="media/audio/cey-sunshine-way.mp3" data-titulo="Sunshine Way" data-autor="Carlos Emilio Younes">
                <span class="num-faixa">01 //</span> <span class="nome-faixa">Sunshine Way</span>
            </li>
            <li class="item-faixa" data-src="media/audio/cey-blue-clouds.mp3" data-titulo="Blue Clouds" data-autor="Djavan & João Bosco">
                <span class="num-faixa">02 //</span> <span class="nome-faixa">Blue Clouds</span>
            </li>
            <li class="item-faixa" data-src="media/audio/cey-manha-leo-norcia.mp3" data-titulo="Manhã" data-autor="Leo Nórcia/Carlos E. Younes">
                <span class="num-faixa">03 //</span> <span class="nome-faixa">Manhã</span>
            </li>
        </ul>
      </div>

    </section>
  </main>

  <footer class="main-footer">
    <div class="footer-container">
      <p>&copy; 2026 CEY MUSIC. Todos os direitos reservados.</p>
      <p class="footer-tech-data">Sistemas Estáticos Puros // Otimizado para Hardware Legado</p>
    </div>
    
  </footer>

  <!-- Chamadas de Scripts Modulares (Ordem de Dependência Nula) -->
  <script src="js/playerjs.js"></script>
  <script src="js/playlistjs.js"></script>
  <script src="js/carouseljs.js"></script>
</body>
</html>
